services:
  - type: web
    name: jb-consulenti
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && cd backend && alembic upgrade head && python create_admin.py
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jb-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: ALLOWED_ORIGINS
        value: "https://jb-consulenti.onrender.com"
    healthCheckPath: /health

databases:
  - name: jb-db
    plan: basic_256mb
